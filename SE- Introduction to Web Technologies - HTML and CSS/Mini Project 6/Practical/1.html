<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Links Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Music Links Form
        </h2>

        <form id="musicForm">

            <div class="mb-3">

                <label>Spotify URL</label>

                <input type="url" id="spotify" class="form-control" placeholder="Enter Spotify URL">

            </div>

            <div class="mb-3">

                <label>YouTube Music URL</label>

                <input type="url" id="youtube" class="form-control" placeholder="Enter YouTube Music URL">

            </div>

            <div class="mb-3">

                <label>Apple Music URL</label>

                <input type="url" id="apple" class="form-control" placeholder="Enter Apple Music URL">

            </div>

            <button class="btn btn-success">
                Submit
            </button>

        </form>

        <hr>

        <div id="preview" class="row"></div>

    </div>

    <script>

        document.getElementById("musicForm").addEventListener("submit", function (e) {

            e.preventDefault();

            let spotify = document.getElementById("spotify").value;

            let youtube = document.getElementById("youtube").value;

            let apple = document.getElementById("apple").value;

            let preview = document.getElementById("preview");

            preview.innerHTML = "";

            if (spotify != "") {

                preview.innerHTML += `

<div class="col-md-4">

<div class="card border-success mb-3">

<div class="card-body">

<h4><i class="bi bi-spotify text-success"></i> Spotify</h4>

<a href="${spotify}" target="_blank" class="btn btn-success">
Visit
</a>

</div>

</div>

</div>

`;

            }

            if (youtube != "") {

                preview.innerHTML += `

<div class="col-md-4">

<div class="card border-danger mb-3">

<div class="card-body">

<h4><i class="bi bi-youtube text-danger"></i> YouTube Music</h4>

<a href="${youtube}" target="_blank" class="btn btn-danger">
Visit
</a>

</div>

</div>

</div>

`;

            }

            if (apple != "") {

                preview.innerHTML += `

<div class="col-md-4">

<div class="card border-dark mb-3">

<div class="card-body">

<h4><i class="bi bi-apple"></i> Apple Music</h4>

<a href="${apple}" target="_blank" class="btn btn-dark">
Visit
</a>

</div>

</div>

</div>

`;

            }

        });

    </script>

</body>

</html>
