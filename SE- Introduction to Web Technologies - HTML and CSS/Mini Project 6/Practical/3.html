<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Icons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .input-group-text {
            width: 50px;
            justify-content: center;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="input-group mb-3">

            <span class="input-group-text">
                <i class="bi bi-instagram"></i>
            </span>

            <input type="text" class="form-control" placeholder="Instagram URL">

        </div>

        <div class="input-group mb-3">

            <span class="input-group-text">
                <i class="bi bi-linkedin"></i>
            </span>

            <input type="text" class="form-control" placeholder="LinkedIn URL">

        </div>

        <div class="input-group mb-3">

            <span class="input-group-text">
                <i class="bi bi-spotify"></i>
            </span>

            <input type="text" class="form-control" placeholder="Spotify URL">

        </div>

    </div>

</body>

</html>
