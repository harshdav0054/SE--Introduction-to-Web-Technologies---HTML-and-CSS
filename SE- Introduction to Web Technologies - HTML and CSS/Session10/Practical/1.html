<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spotify Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .navbar-brand{
            font-size: 30px;
            font-weight: bold;
        }

        .nav-link{
            font-size: 20px;
            margin-left: 15px;
        }

        @media (max-width:576px){

            .navbar-brand{
                font-size: 24px;
            }

            .nav-link{
                font-size: 18px;
                text-align: center;
            }

        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="#">
            Spotify
        </a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Playlists</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Profile</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2>Welcome to Spotify</h2>

    <p>
        This is a responsive Bootstrap Navbar.
        On desktop, the navigation links are displayed horizontally.
        On mobile devices, the links collapse into a hamburger menu.
    </p>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
