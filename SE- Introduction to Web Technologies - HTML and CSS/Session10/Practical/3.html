<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Carousel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <div id="movieSlider" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">

                    <img src="The_Big_Bull_Film.jpg" class="d-block w-100">

                    <div class="carousel-caption">
                        <h3>The Big Bull</h3>
                    </div>

                </div>

                <div class="carousel-item">

                    <img src="harshad_mehta.jpg" class="d-block w-100">

                    <div class="carousel-caption">
                        <h3>Scam 1992</h3>
                    </div>

                </div>

                <div class="carousel-item">

                    <img src="Baazaar.jpg" class="d-block w-100">

                    <div class="carousel-caption">
                        <h3>Baazaar</h3>
                    </div>

                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#movieSlider" data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>

            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#movieSlider" data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
