<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5 bg-light text-dark p-5 rounded" id="themeBox">

        <h2>Bootstrap Theme Switcher</h2>

        <p>
            Click the button to switch between Light Mode and Dark Mode.
        </p>

        <button class="btn btn-dark" onclick="changeTheme()">
            Switch Theme
        </button>

    </div>

    <script>

        function changeTheme() {

            let box = document.getElementById("themeBox");

            box.classList.toggle("bg-light");
            box.classList.toggle("bg-dark");

            box.classList.toggle("text-dark");
            box.classList.toggle("text-light");

        }

    </script>

</body>

</html>
