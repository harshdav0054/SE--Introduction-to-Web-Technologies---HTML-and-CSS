<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <div class="col-md-3 col-6">

                <div class="card">

                    <img src="headphone.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Headphones</h5>

                        <p>₹1,999</p>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>

                    </div>

                </div>

            </div>

            <div class="col-md-3 col-6">

                <div class="card">

                    <img src="speaker.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Speaker</h5>

                        <p>₹3,499</p>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>

                    </div>

                </div>

            </div>

            <div class="col-md-3 col-6">

                <div class="card">

                    <img src="smartwatch.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Smart Watch</h5>

                        <p>₹4,999</p>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>

                    </div>

                </div>

            </div>

            <div class="col-md-3 col-6">

                <div class="card">

                    <img src="eyebuds.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Bluetooth Earbuds</h5>

                        <p>₹2,499</p>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
