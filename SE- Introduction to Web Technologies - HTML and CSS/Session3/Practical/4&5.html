<!DOCTYPE html>
<html>
<head>
    <title>Forms & Inputs Assignment</title>
</head>
<body>

    <h1>Zomato Food Order Form</h1>

    <form>

        <label for="orderid">Order ID:</label>
        <input type="text" id="orderid" name="orderid" value="ORD12345" disabled>

        <br><br>

        <label for="name">Customer Name:</label>
        <input type="text" id="name" name="name" required>

        <br><br>

        <label for="food">Food Item:</label>
        <select id="food" name="food" required>
            <option value="" selected disabled>Select Food Item</option>
            <option value="Pizza">Pizza</option>
            <option value="Burger">Burger</option>
            <option value="Pasta">Pasta</option>
            <option value="Sandwich">Sandwich</option>
        </select>

        <br><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="1" required>

        <br><br>

        <label for="instructions">Delivery Instructions:</label><br>
        <textarea id="instructions" name="instructions" rows="4" cols="30"></textarea>

        <br><br>

        <input type="submit" value="Place Order">

    </form>

    <!--
    The Order ID field is disabled because it is generated automatically by the system.
    Users can view the Order ID but cannot modify it.
    This helps maintain data accuracy and prevents accidental changes.
    -->

</body>
</html>
