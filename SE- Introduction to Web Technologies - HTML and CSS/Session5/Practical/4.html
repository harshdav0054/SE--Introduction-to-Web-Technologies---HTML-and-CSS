<!DOCTYPE html>
<html>
<head>
    <title>Spotify Playlist</title>

    <style>

        *{
            padding: 0;
            margin: 0;
        }

        .playlist-item{
            background-color: black;
            color: white;
            padding: 10px;
            margin: 5px;
        }

        #playing{
            background-color: green;
            color: white;
        }

    </style>

</head>
<body>

    <div class="playlist-item">Song 1</div>

    <div class="playlist-item" id="playing">
        Song 2 (Currently Playing)
    </div>

    <div class="playlist-item">Song 3</div>

</body>
</html>
