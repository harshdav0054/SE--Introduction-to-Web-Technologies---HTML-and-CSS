<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Notification Badge</title>

    <style>

        .whatsapp{
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
        }

        .badge{
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: red;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

    </style>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <div class="whatsapp">

        <i class="fa-brands fa-whatsapp"></i>

        <div class="badge">
            5
        </div>

    </div>

</body>
</html>
