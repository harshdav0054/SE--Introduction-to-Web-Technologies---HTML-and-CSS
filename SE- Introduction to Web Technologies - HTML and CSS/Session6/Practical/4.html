<!DOCTYPE html>
<html>
<head>
    <title>BookMyShow Poster Grid</title>

    <style>

        .poster{
            position: relative;
            width: 250px;
            display: inline-block;
            margin: 20px;
        }

        .poster img{
            width: 100%;
            border-radius: 10px;
        }

        .new-badge{
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="poster">

        <div class="new-badge">NEW</div>

        <img src="The_Big_Bull_Film.jpg" alt="The Big Bull">

    </div>

</body>
</html>
