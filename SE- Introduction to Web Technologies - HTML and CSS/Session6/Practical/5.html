<!DOCTYPE html>
<html>
<head>
    <title>Reusable CSS Class Example</title>

    <style>

        /* Reusable Class */
        .box{
            margin: 20px;
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
        }

        .restaurant{
            background-color: #fff3cd;
        }

        .product{
            background-color: #d1ecf1;
        }

    </style>
</head>
<body>

    <div class="box restaurant">
        <h2>The Grand Thakar</h2>
        <p>Cuisine: Gujarati Thali</p>
        <p>Rating: ⭐ 4.5/5</p>
    </div>

    <div class="box product">
        <h2>Lenovo LOQ 15IAX9</h2>
        <p>Price: ₹65,999</p>
    </div>

</body>
</html>
