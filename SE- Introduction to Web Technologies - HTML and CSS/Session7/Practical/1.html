<!DOCTYPE html>
<html>
<head>
    <title>Social Icons</title>

    <style>
        .container{
            display: flex;
            justify-content: space-evenly;
            margin-top: 50px;
            border: 1px solid black;
        }

        .container img{
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>

    <div class="container">

        <img src="insta.jpg" alt="Instagram">
        <img src="whatsapp.png" alt="WhatsApp">
        <img src="zomato.jpg" alt="Zomato">
        <img src="spotify.png" alt="Spotify">

    </div>

</body>
</html>
