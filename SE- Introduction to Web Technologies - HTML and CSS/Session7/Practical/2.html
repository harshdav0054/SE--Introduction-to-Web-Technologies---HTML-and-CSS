<!DOCTYPE html>
<html>
<head>
    <title>Spotify Playlist</title>

    <style>

        .playlist{
            display: flex;
            gap: 15px;
        }

        .song{
            width: 180px;
            height: 80px;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <div class="playlist">

        <div class="song">Believer - Imagine Dragons</div>

        <div class="song">Shape of You - Ed Sheeran</div>

        <div class="song">Perfect - Ed Sheeran</div>

        <div class="song">On My Way - Alan Walker</div>

        <div class="song">Closer - Chainsmokers</div>

    </div>

</body>
</html>
