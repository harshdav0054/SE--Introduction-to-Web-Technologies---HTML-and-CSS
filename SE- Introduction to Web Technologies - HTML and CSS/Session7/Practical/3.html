<!DOCTYPE html>
<html>
<head>
    <title>Flipkart Product Grid</title>

    <style>

        .grid{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .card img{
            width: 100%;
        }

    </style>
</head>
<body>

    <div class="grid">

        <div class="card">
            <img src="laptop.jpg">
            <h3>Laptop</h3>
        </div>

        <div class="card">
            <img src="mobail.jpg">
            <h3>Mobile</h3>
        </div>

        <div class="card">
            <img src="headphone.jpg">
            <h3>Headphones</h3>
        </div>

        <div class="card">
            <img src="keyboard.jpeg">
            <h3>Keyboard</h3>
        </div>

        <div class="card">
            <img src="mouse.jpg">
            <h3>Mouse</h3>
        </div>

        <div class="card">
            <img src="monitor.jpg">
            <h3>Monitor</h3>
        </div>

    </div>

</body>
</html>
