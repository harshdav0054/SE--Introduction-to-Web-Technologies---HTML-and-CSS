<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 4</title>
    <style>
        .grid{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card{
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        img{
            width: 100%;
        }

        @media(max-width:768px){
            .grid{
                grid-template-columns: repeat(2,1fr);
            }
        }

        @media(max-width:480px){
            .grid{
                grid-template-columns: repeat(1,1fr);
            }
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">
            <img src="laptop.jpg" alt="laptop img">
            <h1>Laptop</h1>
        </div>
        <div class="card">
            <img src="tablet.jpg" alt="tablet img">
            <h1>tablet</h1>
        </div>
        <div class="card">
            <img src="mobail.jpg" alt="mobail img">
            <h1>mobail</h1>
        </div>
        <div class="card">
            <img src="headphone.jpg" alt="headphone img">
            <h1>headphone</h1>
        </div>
        <div class="card">
            <img src="monitor.jpg" alt="monitor img">
            <h1>monitor</h1>
        </div>
        <div class="card">
            <img src="mouse.jpg" alt="mouse img">
            <h1>mouse</h1>
        </div>
    </div>
</body>
</html>
