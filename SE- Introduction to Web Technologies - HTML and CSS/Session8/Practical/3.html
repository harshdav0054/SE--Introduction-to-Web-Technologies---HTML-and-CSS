<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.card{
    display: flex;
    border: 1px solid black;
    padding: 25px;
    max-width: 800px;
    margin: auto;
    font-size: 20px;
}

/* Desktop */
@media only screen and (max-width:1200px){

    .card{
        font-size: 18px;
        padding: 20px;
    }
}

/* Tablet */
@media only screen and (max-width:900px){

    .card{
        font-size: 16px;
        padding: 15px;
    }
}

/* Mobile */
@media only screen and (max-width:600px){

    .card{
        flex-direction: column;
        font-size: 14px;
        padding: 10px;
    }
}

</style>

</head>
<body>

<div class="card">

    <img src="laptop.jpg" alt="Laptop">

    <div>
        <h2>Lenovo LOQ 15IAX9</h2>
        <p>Gaming Laptop</p>
        <h3>₹65,999</h3>
    </div>

</div>

</body>
</html>
