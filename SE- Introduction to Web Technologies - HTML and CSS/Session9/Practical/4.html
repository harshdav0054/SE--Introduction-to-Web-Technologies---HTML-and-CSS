<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Bootstrap Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <!-- Movie Poster -->
            <div class="col-12 col-sm-6">
                <div class="card">
                    <img src="The_Big_Bull_Film.jpg" class="card-img-top img-fluid" alt="Movie Poster">
                </div>
            </div>

            <!-- Movie Details -->
            <div class="col-12 col-sm-6">
                <div class="card p-3">
                    <h3>The Big Bull</h3>
                    <p><strong>Genre:</strong> Drama</p>
                    <p><strong>Rating:</strong> ⭐ 4.3/5</p>
                    <button class="btn btn-primary">Book Now</button>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
